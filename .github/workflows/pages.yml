name: Deploy site to GitHub Pages

# site/ 정적 데모를 GitHub Pages로 배포한다.
# main 브랜치 push(site/ 또는 이 워크플로우 변경 시) 또는 Actions 탭 수동 실행으로 트리거.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 — 진행 중 배포는 취소하지 않고 큐잉
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Public 레포에서 Pages가 아직 안 켜져 있으면 워크플로우가 자동으로 켠다
          # (Settings → Pages 수동 설정 불필요)
          enablement: true

      - name: Stamp asset version (cache-bust)
        # index.html의 ?v=__V__ 를 커밋 SHA로 치환 → 배포 즉시 새 자산 로드
        run: sed -i "s/__V__/${GITHUB_SHA::7}/g" site/index.html

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
