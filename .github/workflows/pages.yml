name: Deploy site to GitHub Pages

# site/ 정적 데모를 GitHub Pages로 배포한다.
# main 병합 없이 테스트 배포할 수 있도록 개발 브랜치 push에서도 트리거.
# (검증 끝나면 branches를 [main]만 남기고 정리 권장)

on:
  push:
    branches:
      - main
      - claude/github-test-site-329rjs
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지 — 진행 중 배포는 취소하지 않고 큐잉
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Public 레포에서 Pages가 아직 안 켜져 있으면 워크플로우가 자동으로 켠다
          # (Settings → Pages 수동 설정 불필요)
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
