name: Deploy site to GitHub Pages

# 정적 데모 사이트(루트 index.html + assets/)를 GitHub Pages로 배포한다.
# main 브랜치 push 또는 Actions 탭 수동 실행으로 트리거.
# 앱이 저장소 루트에 있으므로 Pages 소스가 "GitHub Actions"든 "Deploy from a branch(main/root)"든
# 모두 동일하게 이 앱이 서빙된다.

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'assets/**'
      - '.nojekyll'
      - 'data/mfds/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # 소스가 branch로 되어 있어도 워크플로우 실행 시 GitHub Actions 방식으로 활성화
          enablement: true

      - name: Stage site files
        run: |
          mkdir -p _site
          cp index.html .nojekyll _site/
          cp -r assets _site/assets
          # 식약처 실데이터(Actions가 구운 정적 JSON)도 함께 배포
          if [ -d data/mfds ]; then mkdir -p _site/data && cp -r data/mfds _site/data/mfds; fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
